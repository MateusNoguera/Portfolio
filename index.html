<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/Main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <title data-i18n="header.resumecv"></title>
</head>
<body class="IndexBody">
    
    <div class="Site">
        <div class="Stars"></div>
        <div class="ShootingStar StarOne"></div>
        <div class="ShootingStar StarTwo"></div>
        <div class="ShootingStar StarThree"></div>
        <div class="ShootingStar StarFour"></div>
        <div class="ShootingStar StarFive"></div>

        <header class="Header">
            <nav class="MenuNav">
                <a href="./" class="MenuNavLink" data-i18n="header.resumecv"></a>
                <a href="" class="MenuNavLink" data-i18n="header.roadmap">Roadmap</a>
                <a href="" class="MenuNavLink" data-i18n="header.projects">Projetos</a>
            </nav>

            <div class="MenuLanguageButtons">
                <button onclick="setLanguage('ptbr')" class="LanguageButton">
                    <img src="images/BrazilIcon.png" alt="Português">
                </button>

                <button onclick="setLanguage('en')" class="LanguageButton">
                    <img src="images/EUAIcon.png" alt="English">
                </button>
            </div>
        </header>

        <main class="IndexMain">
            <section class="AboutSection">
                <h1 class="AboutDevName" data-i18n="main.dev.name"></h1>
                <p class="AboutDevDescription" data-i18n="main.dev.description"></p>
            </section>

            <section class="ExperienceSection">
                <h2 class="SectionTitle" data-i18n="main.experiencetitle"></h2>

                <article class="ExperienceCard">
                    <img class="ExperienceLogo" src="images/BildenNegociosLogo.jpg" alt="Logo Bilden">

                    <div class="ExperienceHeader">
                        <h3 data-i18n="main.experience.bilden.name"></h3>
                        <p data-i18n="main.experience.bilden.period"></p>
                    </div>

                    <p class="ExperienceDescription" data-i18n="experience.bilden.description"></p>
                </article>
            </section>

        </main>

    </div>

    <script src="Functions.js"></script>
</body>
</html>
