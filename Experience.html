<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/Main.css">
    <title>Experience</title>
</head>
<body class="ExperienceBody">
    <div class="Site">
        <div class="stars"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        <div class="shooting-star"></div>
        
        <header class="ExperienceHeader">
            <div class="ExperienceMenu">
                <!-- Somente em TESTES usar o nome do arquivo.HTML -->
                <!-- Em PRD usar ./ para o index e ./Nome para os demais -->
                <div class="IndexTxtMenu"> <a data-i18n="site.abouttxt" href="./"></a> </div>
                <div class="IndexTxtMenu"> <a data-i18n="site.experiencetxt" href="./Experience.html"></a> </div>
                <div class="IndexTxtMenu"> <a data-i18n="site.updatestxt" href="./Updates.html"></a> </div>
            </div>
            <div class="IconContainer">
                <input type="image" src="images/BrazilIcon.png" onclick="setLanguage('ptbr')" class="MenuIcon" id="BrazilIcon"/>
                <input type="image" src="images/EUAIcon.png" onclick="setLanguage('en')" class="MenuIcon" id="UsaIcon"/>
            </div>
        </header>

        <main class="ExperienceMain">
            <div class="ExperienceTitles"> <p data-i18n="site.experiencetxt"></p> </div>

            <div class="ExperienceBildenContainer">
                <div class="ImageBilden"> <img src="images/BildenNegociosLogo.jpg" alt="Logo empresa Bilden"></div>
                <div class="TextExperiences"> <p data-i18n="experience.txtbilden" class="pre-line-text"></p> </div>
            </div>
            <div class="InfoBildenContainer"> <p data-i18n="experience.infobilden" class="pre-line-text"></p> </div>

            <div class="ExperienceGEOvendasContainer">
                <div class="ImageGEOvendas"> <img src="images/GEOvendas.jpg" alt="Logo empresa IbTech"> </div>
                <div class="TextExperiences"> <p data-i18n="experience.txtgeovendas" class="pre-line-text"></p> </div>
            </div>
            <div class="InfoGEOvendasContainer"> <p data-i18n="experience.infogeovendas" class="pre-line-text"></p> </div>

            <div class="ExperienceBytecomContainer">
                <div class="ImageBytecom"> <img src="images/BytecomLogo.jpg" alt="Logo empresa Bytecom sistemas"> </div>
                <div class="TextExperiences"> <p data-i18n="experience.txtbytecom" class="pre-line-text"></p> </div>
            </div>
            <div class="InfoBytecomContainer"> <p data-i18n="experience.infobytecom" class="pre-line-text"></p> </div>

            <div class="ExperienceDessisContainer">
                <div class="ImageDessis"> <img src="images/DessisLogo.jpg" alt="Logo empresa Dessis sistemas"> </div>
                <div class="TextExperiences"> <p data-i18n="experience.txtdessis" class="pre-line-text"></p> </div>
            </div>
            <div class="InfoDessisContainer"> <p data-i18n="experience.infodessis" class="pre-line-text"></p> </div>

            <div data-i18n="experience.languagestxt" class="ExperienceTitles LanguagesSection"></div>

            <div class="ExperienceLanguagesContainer">
                <div> <img class="ExperiencelanguageIcons" src="images/BrazilIcon.png" alt="Brazil"> </div>
                <div data-i18n="experience.languagetxtptbr" class="TextExperiences ExperiencelanguageTxt pre-line-text"></div>
            </div>

            <div class="ExperienceLanguagesContainer">
                <div> <img class="ExperiencelanguageIcons" src="images/EUAIcon.png" alt="United States of America"> </div>
                <div data-i18n="experience.languagetxtusa" class="TextExperiences ExperiencelanguageTxt pre-line-text"></div>
            </div>

            <div class="ExperienceLanguagesContainer">
                <div> <img class="ExperiencelanguageIcons" src="images/JapanIcon.png" alt="Japan"> </div>
                <div data-i18n="experience.languagetxtjapan" class="TextExperiences ExperiencelanguageTxt pre-line-text"></div>
            </div>

        </main>

        <footer class="IndexFooter">
            <div data-i18n="footer.devname" class="IndexTxtFooter"></div>
        </footer>

        <script src="Functions.js"></script>
    </div>
</body>
</html>
